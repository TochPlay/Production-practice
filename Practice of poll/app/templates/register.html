<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Реєстрація</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🆕 Реєстрація</h2>

    <form method="post">
        <input name="username" placeholder="Логін" required>
        <input name="password" type="password" placeholder="Пароль" required>
        <button type="submit">Зареєструватись</button>
    </form>
</div>

</body>
</html>
