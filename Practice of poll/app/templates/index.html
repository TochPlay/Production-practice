<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Прогноз хімії для басейну</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f9ff;
            border-radius: 10px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💧 Прогноз використання хімії</h2>

    <form method="post">
        <label>Обʼєм басейну (м³):</label>
        <input type="number" name="volume" step="any" required>

        <label>Температура води (°C):</label>
        <input type="number" name="temperature" step="any" required>

        <button type="submit">🔍 Розрахувати</button>
    </form>

    <form action="/plot">
        <button type="submit">📊 Показати графік</button>
    </form>

    {% if prediction is not none %}
        <div class="result">
            Прогноз: <b>{{ prediction }} кг</b>
        </div>
    {% endif %}
</div>
</body>
</html>
